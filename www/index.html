<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Catálogo Multimedia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- jQuery Mobile -->
  <link rel="stylesheet" href="lib/jquery/jquery.mobile-1.4.5.min.css">
  <link rel="stylesheet" href="css/app.css">
  <script src="lib/jquery/jquery-1.11.1.min.js"></script>
  <script src="lib/jquery/jquery.mobile-1.4.5.min.js"></script>
  <script src="js/app.js"></script>
</head>
<body>

<!-- Página principal -->
<div data-role="page" id="home">
  <div data-role="header" data-position="fixed">
    <h1>Catálogo Multimedia</h1>
  </div>
  <div role="main" class="ui-content">
    <div class="ui-grid-a ui-responsive">
      <div class="ui-block-a">
        <a href="#catalogo" class="ui-btn ui-corner-all ui-btn-b">Ver catálogo</a>
      </div>
      <div class="ui-block-b">
        <a href="#acerca" class="ui-btn ui-corner-all">Acerca</a>
      </div>
    </div>
  </div>
</div>

<!-- Página catálogo (lista de productos) -->
<div data-role="page" id="catalogo">
  <div data-role="header" data-position="fixed">
    <h1>Productos</h1>
    <a href="#home" data-icon="home" data-role="button" data-iconpos="notext">Inicio</a>
  </div>
  <div role="main" class="ui-content">
    <form id="filters" class="ui-field-contain">
      <label for="search">Buscar:</label>
      <input type="search" id="search" placeholder="Nombre o categoría">
      <label for="category">Categoría:</label>
      <select id="category">
        <option value="">Todas</option>
      </select>
    </form>

    <ul id="product-list" data-role="listview" data-inset="true" data-filter="false">
      <!-- Render dinámico -->
    </ul>
  </div>
</div>

<!-- Página detalle de producto -->
<div data-role="page" id="detalle">
  <div data-role="header" data-position="fixed">
    <h1>Detalle</h1>
    <a href="#catalogo" data-icon="back" data-role="button" data-iconpos="notext">Atrás</a>
  </div>
  <div role="main" class="ui-content">
    <div id="detail-header"></div>

    <div data-role="collapsible-set">
      <div data-role="collapsible" data-collapsed="false">
        <h3>Descripción</h3>
        <div id="detail-description"></div>
      </div>

      <div data-role="collapsible">
        <h3>Galería de imágenes</h3>
        <div id="detail-images" class="gallery"></div>
      </div>

      <div data-role="collapsible">
        <h3>Videos</h3>
        <div id="detail-videos"></div>
      </div>

      <div data-role="collapsible">
        <h3>Audios</h3>
        <div id="detail-audios"></div>
      </div>
    </div>
  </div>
</div>

<!-- Página acerca -->
<div data-role="page" id="acerca">
  <div data-role="header" data-position="fixed">
    <h1>Acerca</h1>
    <a href="#home" data-icon="home" data-role="button" data-iconpos="notext">Inicio</a>
  </div>
  <div role="main" class="ui-content">
    <p>Catálogo multimedia offline-first con jQuery Mobile y JSON.</p>
    <p>Optimizado para empaquetar con Cordova como APK.</p>
  </div>
</div>

</body>
</html>
